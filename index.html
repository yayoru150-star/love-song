<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Song - My Page</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            
            /* ===== BACKGROUND IMAGE WITH GREEN OVERLAY ===== */
            background-image: 
                linear-gradient(rgba(0, 184, 148, 0.6), rgba(26, 122, 90, 0.8)),
                url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .card:hover {
            transform: translateY(-5px);
        }
        h1 {
            background: linear-gradient(135deg, #2d9b7a, #1a7a5a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 32px;
        }
        .photo-container {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 4px solid #2d9b7a;
            box-shadow: 0 8px 25px rgba(45, 155, 122, 0.4);
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .audio-player {
            margin: 20px 0 30px;
        }
        .audio-player audio {
            width: 100%;
            border-radius: 30px;
        }
        .qr-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #d4edda;
        }
        .qr-section h3 {
            color: #1a7a5a;
            margin-bottom: 15px;
            font-weight: 600;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 0 auto;
        }
        #qrcode img,
        #qrcode canvas {
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(45, 155, 122, 0.3);
        }
        .link-display {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            word-break: break-all;
            background: #e8f5ee;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #b8d9c9;
        }
        .link-display a {
            color: #1a7a5a;
            text-decoration: none;
            font-weight: 600;
        }
        .link-display a:hover {
            text-decoration: underline;
        }
        .note {
            margin-top: 20px;
            font-size: 13px;
            color: #7a9a8a;
        }
        .green-badge {
            display: inline-block;
            background: linear-gradient(135deg, #55c7a6, #1a7a5a);
            color: white;
            padding: 5px 18px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
            font-weight: 500;
        }
        .audio-player audio::-webkit-media-controls-panel {
            background: linear-gradient(135deg, #a8e6cf, #2d9b7a);
        }
        .audio-player audio::-webkit-media-controls-play-button {
            background-color: #1a7a5a;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🌿 Love Song</h1>

        <div class="photo-container">
            <img 
                src="photo.jpg" 
                alt="Person's Photo"
                onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%2355c7a6%22/%3E%3Ctext x=%2250%22 y=%22115%22 font-family=%22Arial%22 font-size=%2220%22 fill=%22white%22%3E📸 Photo%3C/text%3E%3C/svg%3E';"
            />
        </div>

        <div class="audio-player">
            <audio controls>
                <source src="Adele-Lovesong.mp3" type="audio/mpeg" />
                Your browser does not support the audio element.
            </audio>
        </div>

        <div class="qr-section">
            <h3>📱 Scan to Visit</h3>
            <div id="qrcode"></div>
            
            <div class="link-display">
                🔗 <a href="#" id="pageLink" target="_blank">Your website link will appear here</a>
            </div>
        </div>

        <div class="note">
            💚 Made with love
            <div class="green-badge">🌱 Green Edition</div>
        </div>
    </div>

    <script>
        const WEBSITE_URL = 'https://yayoru150-star.github.io/love-song/';

        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = '';

        const qr = new QRCode(qrContainer, {
            text: WEBSITE_URL,
            width: 200,
            height: 200,
            colorDark: '#1a7a5a',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        const linkElement = document.getElementById('pageLink');
        linkElement.href = WEBSITE_URL;
        linkElement.textContent = WEBSITE_URL;

        console.log('✅ QR Code generated for:', WEBSITE_URL);
    </script>

</body>
</html>
