<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Song - My Page</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            
            background-image: 
                linear-gradient(rgba(0, 184, 148, 0.6), rgba(26, 122, 90, 0.8)),
                url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .card:hover {
            transform: translateY(-5px);
        }
        h1 {
            background: linear-gradient(135deg, #2d9b7a, #1a7a5a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            font-weight: 700;
            font-size: 32px;
        }
        
        /* ===== QUOTE STYLE ===== */
        .quote {
            font-size: 18px;
            font-style: italic;
            color: #1a7a5a;
            margin: 10px 0 25px;
            padding: 10px 20px;
            background: rgba(0, 184, 148, 0.08);
            border-radius: 12px;
            border-left: 4px solid #2d9b7a;
            border-right: 4px solid #2d9b7a;
            font-weight: 500;
            line-height: 1.6;
        }
        .quote::before {
            content: '"';
            font-size: 30px;
            color: #2d9b7a;
            font-weight: 700;
        }
        .quote::after {
            content: '"';
            font-size: 30px;
            color: #2d9b7a;
            font-weight: 700;
        }
        
        /* ===== FLIP CARD CONTAINER ===== */
        .flip-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            perspective: 1000px;
            cursor: pointer;
        }
        
        .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }
        
        .flip-container.flipped .flip-inner {
            transform: rotateY(180deg);
        }
        
        .flip-front, .flip-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(45, 155, 122, 0.4);
        }
        
        .flip-front {
            border: 4px solid #2d9b7a;
        }
        
        .flip-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .flip-back {
            background: linear-gradient(135deg, #2d9b7a, #1a7a5a);
            transform: rotateY(180deg);
            border: 4px solid #2d9b7a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
            text-align: center;
            line-height: 1.8;
            font-weight: 500;
        }
        
        .flip-back .heart-icon {
            font-size: 35px;
            margin-bottom: 10px;
        }
        
        .flip-back .message {
            font-size: 16px;
            padding: 0 5px;
        }
        
        .flip-back .message strong {
            font-size: 18px;
        }
        
        .flip-back .hint {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 12px;
            font-style: italic;
        }
        
        /* ===== CLICK INSTRUCTION ===== */
        .click-hint {
            font-size: 12px;
            color: #7a9a8a;
            margin-top: -10px;
            margin-bottom: 15px;
            opacity: 0.7;
        }
        .click-hint span {
            display: inline-block;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .audio-player {
            margin: 20px 0 30px;
        }
        .audio-player audio {
            width: 100%;
            border-radius: 30px;
        }
        .qr-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #d4edda;
        }
        .qr-section h3 {
            color: #1a7a5a;
            margin-bottom: 15px;
            font-weight: 600;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 0 auto;
        }
        #qrcode img,
        #qrcode canvas {
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(45, 155, 122, 0.3);
        }
        .link-display {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            word-break: break-all;
            background: #e8f5ee;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #b8d9c9;
        }
        .link-display a {
            color: #1a7a5a;
            text-decoration: none;
            font-weight: 600;
        }
        .link-display a:hover {
            text-decoration: underline;
        }
        .note {
            margin-top: 20px;
            font-size: 13px;
            color: #7a9a8a;
        }
        .green-badge {
            display: inline-block;
            background: linear-gradient(135deg, #55c7a6, #1a7a5a);
            color: white;
            padding: 5px 18px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
            font-weight: 500;
        }
        .audio-player audio::-webkit-media-controls-panel {
            background: linear-gradient(135deg, #a8e6cf, #2d9b7a);
        }
        .audio-player audio::-webkit-media-controls-play-button {
            background-color: #1a7a5a;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🌿 Love Song</h1>
        
        <p class="quote">Where words fail, music speaks</p>

        <!-- ====== FLIP PHOTO SECTION ====== -->
        <div class="flip-container" id="flipCard">
            <div class="flip-inner">
                <!-- FRONT: Photo -->
                <div class="flip-front">
                    <img 
                        src="photo.jpg" 
                        alt="Person's Photo"
                        onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%2355c7a6%22/%3E%3Ctext x=%2250%22 y=%22115%22 font-family=%22Arial%22 font-size=%2220%22 fill=%22white%22%3E📸 Photo%3C/text%3E%3C/svg%3E';"
                    />
                </div>
                <!-- BACK: Your Special Message -->
                <div class="flip-back">
                    <div class="heart-icon">💚</div>
                    <div class="message">
                        Whenever I'm alone with you<br />
                        <strong>I feel like I'm home again</strong>
                    </div>
                    <div class="hint">💫 Click to flip back</div>
                </div>
            </div>
        </div>

        <!-- Click hint -->
        <div class="click-hint">
            <span>👆 Click the photo to flip it!</span>
        </div>

        <div class="audio-player">
            <audio controls id="myAudio">
                <source src="Adele-Lovesong.mp3" type="audio/mpeg" />
                Your browser does not support the audio element.
            </audio>
        </div>

        <div class="qr-section">
            <h3>📱 Scan to Visit</h3>
            <div id="qrcode"></div>
            
            <div class="link-display">
                🔗 <a href="#" id="pageLink" target="_blank">Your website link will appear here</a>
            </div>
        </div>

        <div class="note">
            💚 Made with love
            <div class="green-badge">🌱 Green Edition</div>
        </div>
    </div>

    <script>
        // ================================================
        // FLIP CARD ON CLICK
        // ================================================
        const flipCard = document.getElementById('flipCard');
        
        flipCard.addEventListener('click', function() {
            this.classList.toggle('flipped');
        });

        // ================================================
        // YOUR WEBSITE URL
        // ================================================
        const WEBSITE_URL = 'https://yayoru150-star.github.io/love-song/';

        // ================================================
        // GENERATE QR CODE
        // ================================================
        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = '';

        const qr = new QRCode(qrContainer, {
            text: WEBSITE_URL,
            width: 200,
            height: 200,
            colorDark: '#1a7a5a',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        // ================================================
        // UPDATE THE LINK DISPLAY
        // ================================================
        const linkElement = document.getElementById('pageLink');
        linkElement.href = WEBSITE_URL;
        linkElement.textContent = WEBSITE_URL;

        console.log('✅ QR Code generated for:', WEBSITE_URL);
    </script>

</body>
</html>
