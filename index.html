<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Song - My Page</title>
    
    <!-- QRCode.js library from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .photo-container {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 4px solid #667eea;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .audio-player {
            margin: 20px 0 30px;
        }
        .audio-player audio {
            width: 100%;
            border-radius: 30px;
        }
        .qr-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #e0e0e0;
        }
        .qr-section h3 {
            color: #555;
            margin-bottom: 15px;
            font-weight: 500;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin: 0 auto;
        }
        #qrcode img,
        #qrcode canvas {
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .link-display {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            word-break: break-all;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
        }
        .link-display a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .link-display a:hover {
            text-decoration: underline;
        }
        .note {
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎵 Love Song</h1>

        <!-- ====== PHOTO SECTION ====== -->
        <div class="photo-container">
            <!-- Using photo.jpg that you uploaded -->
            <img 
                src="photo.jpg" 
                alt="Person's Photo"
                id="profilePhoto"
                onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%23667eea%22/%3E%3Ctext x=%2250%22 y=%22115%22 font-family=%22Arial%22 font-size=%2220%22 fill=%22white%22%3E📸 Photo%3C/text%3E%3C/svg%3E';"
            />
        </div>

        <!-- ====== SONG / AUDIO SECTION ====== -->
        <div class="audio-player">
            <audio controls>
                <!-- USING YOUR SONG FILE -->
                <source src="Adele-Lovesong.mp3" type="audio/mpeg" />
                Your browser does not support the audio element.
            </audio>
        </div>

        <!-- ====== QR CODE SECTION ====== -->
        <div class="qr-section">
            <h3>📱 Scan to Visit</h3>
            <div id="qrcode"></div>
            
            <div class="link-display">
                🔗 <a href="#" id="pageLink" target="_blank">Your website link will appear here</a>
            </div>
        </div>

        <div class="note">
            💡 Made with ❤️
        </div>
    </div>

    <script>
        // ================================================
        // YOUR WEBSITE URL - UPDATE THIS!
        // ================================================
        const WEBSITE_URL = 'https://yayoru150-star.github.io/love-song/';

        // ================================================
        // GENERATE QR CODE
        // ================================================
        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = '';

        const qr = new QRCode(qrContainer, {
            text: WEBSITE_URL,
            width: 200,
            height: 200,
            colorDark: '#333333',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        // ================================================
        // UPDATE THE LINK DISPLAY
        // ================================================
        const linkElement = document.getElementById('pageLink');
        linkElement.href = WEBSITE_URL;
        linkElement.textContent = WEBSITE_URL;

        console.log('✅ QR Code generated for:', WEBSITE_URL);
    </script>

</body>
</html>
